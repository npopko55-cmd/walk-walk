<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шагай Дома — Выбери свой кейс</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #ce2c01;
      --red-hover: #b52700;
      --orange: #ffb600;
      --orange-hover: #e8a600;
      --orange-border: #e89500;
      --dark: #1f1300;
      --white: #ffffff;
      --light: #f5f5f5;
      --gray: #e0e0e0;
      --mid-gray: #888;
      --green: #0c845a;
      --green-light: #62c584;
      --radius-btn: 30px;
      --radius-card: 16px;
      --font-head: 'Unbounded', sans-serif;
      --font-body: 'Inter', Arial, sans-serif;
      --max-w: 1200px;
      --transition: .25s ease;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      color: var(--dark);
      background: var(--white);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PROMO BAR (green, like walk-walk.ru) ── */
    .promo-bar {
      background: var(--green);
      color: #fff;
      text-align: center;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .promo-bar__badge {
      background: var(--orange);
      color: var(--dark);
      font-weight: 700;
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 20px;
    }

    /* ── HEADER (matches walk-walk.ru) ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 0 32px;
      height: 80px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header__logo {
      text-decoration: none;
      display: flex; align-items: center; gap: 0;
      flex-shrink: 0;
    }
    .header__logo svg {
      height: 40px;
      width: auto;
    }
    .header__nav {
      display: flex; align-items: center; gap: 8px;
    }
    .header__link {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--dark);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background var(--transition);
    }
    .header__link:hover { background: var(--light); }
    /* Header CTA — exact walk-walk.ru style: red default → orange hover */
    .header__cta {
      background: var(--red);
      color: #fff;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      white-space: nowrap;
    }
    .header__cta:hover {
      background: var(--orange);
      color: var(--dark);
    }

    /* ── CONTAINER ── */
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; }

    /* ── BUTTONS (walk-walk.ru style: flat, no border/shadow) ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-body);
      font-weight: 600; font-size: 16px;
      padding: 16px 32px;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      border: none;
      line-height: 1.2;
      text-align: center;
    }
    /* Primary red button (like "Оформить абонемент" on walk-walk.ru) */
    .btn--red {
      background: var(--red);
      color: #fff;
    }
    .btn--red:hover { background: var(--red-hover); }
    /* Orange button */
    .btn--orange {
      background: var(--orange);
      color: var(--dark);
    }
    .btn--orange:hover { background: var(--orange-hover); }
    /* Dark button */
    .btn--dark { background: var(--dark); color: #fff; }
    .btn--dark:hover { background: #3a2a10; }
    /* White outlined button (like "Купить в подарок") */
    .btn--outline-white {
      background: var(--white);
      color: var(--dark);
      border: 2px solid var(--gray);
    }
    .btn--outline-white:hover { border-color: var(--dark); }
    /* Red outlined button */
    .btn--outline-red {
      background: transparent;
      color: var(--red);
      border: 2px solid var(--red);
    }
    .btn--outline-red:hover { background: var(--red); color: #fff; }
    /* Dark outlined button */
    .btn--outline-dark {
      background: transparent;
      color: var(--dark);
      border: 2px solid var(--dark);
    }
    .btn--outline-dark:hover { background: var(--dark); color: #fff; }
    .btn--large { font-size: 17px; padding: 18px 44px; }
    .btn--full { width: 100%; }

    /* ── SCREEN 1: CASES ── */
    .hero { text-align: center; padding: 60px 0 20px; }
    .hero__title {
      font-family: var(--font-head);
      font-weight: 900; font-size: clamp(28px, 5vw, 48px);
      color: var(--dark);
      margin-bottom: 16px;
    }
    .hero__sub {
      font-size: 18px; color: var(--mid-gray);
      max-width: 620px; margin: 0 auto;
    }

    .cases-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      padding: 40px 0 30px;
    }
    .case-card {
      background: var(--white);
      border-radius: var(--radius-card);
      border: 2px solid var(--light);
      overflow: hidden;
      text-align: center;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .case-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,.1);
    }
    .case-card__photo {
      width: 100%; aspect-ratio: 3/4;
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .case-card__photo-circle {
      width: 75%; aspect-ratio: 1;
      background: var(--gray);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      padding: 20px;
    }
    .case-card__photo-icon {
      font-size: 48px; opacity: .4;
      filter: grayscale(1);
    }
    .case-card__photo-text {
      font-size: 11px; color: var(--mid-gray);
      text-align: center; line-height: 1.3;
    }
    .case-card__body { padding: 20px 16px 24px; }
    .case-card__label {
      font-family: var(--font-head);
      font-weight: 700; font-size: 15px;
      margin-bottom: 16px;
      color: var(--dark);
    }
    .case-card__btn {
      width: 100%;
      font-size: 13px; padding: 12px 16px;
      font-family: var(--font-head);
      font-weight: 600;
    }

    .bottom-cta {
      text-align: center;
      padding: 30px 0 60px;
    }

    /* ── SCREEN 2: CASE PAGE ── */
    .case-hero {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 48px;
      padding: 50px 0 40px;
      align-items: start;
    }
    .case-hero__photo {
      width: 100%; aspect-ratio: 3/4;
      background: var(--light);
      border-radius: var(--radius-card);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .case-hero__photo-inner {
      width: 70%; aspect-ratio: 1;
      background: var(--gray);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; padding: 20px;
    }
    .case-hero__photo-icon { font-size: 64px; opacity: .35; filter: grayscale(1); }
    .case-hero__photo-text { font-size: 13px; color: var(--mid-gray); text-align: center; }

    .case-hero__title {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: clamp(22px, 3.5vw, 34px);
      margin-bottom: 32px;
      line-height: 1.3;
    }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 2px solid var(--gray); }
    .tab {
      padding: 12px 24px;
      font-family: var(--font-head);
      font-weight: 600; font-size: 13px;
      color: var(--mid-gray);
      cursor: pointer;
      border: none; background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition);
    }
    .tab:hover { color: var(--dark); }
    .tab--active {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    .tab-content { display: none; }
    .tab-content--active { display: block; }
    .tab-content__list {
      list-style: none;
      display: flex; flex-direction: column; gap: 14px;
      margin-bottom: 32px;
    }
    .tab-content__item {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 16px;
    }
    .tab-content__check {
      width: 26px; height: 26px; flex-shrink: 0;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 700;
      margin-top: 1px;
    }

    .case-hero__buttons { display: flex; gap: 16px; flex-wrap: wrap; }

    /* Section 2.2: Real Cases */
    .real-cases { padding: 50px 0; background: var(--light); }
    .section-title {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: clamp(22px, 3.5vw, 32px);
      text-align: center;
      margin-bottom: 40px;
    }
    .section-title--red { color: var(--red); }

    .cases-scroll {
      display: flex; gap: 24px;
      overflow-x: auto;
      padding-bottom: 16px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .cases-scroll::-webkit-scrollbar { height: 6px; }
    .cases-scroll::-webkit-scrollbar-track { background: var(--gray); border-radius: 3px; }
    .cases-scroll::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

    .ba-card {
      flex: 0 0 340px;
      scroll-snap-align: start;
      background: var(--white);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
    }
    .ba-card__photos { display: flex; }
    .ba-card__photo {
      flex: 1; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
      padding: 12px; position: relative;
    }
    .ba-card__photo--before { background: #fce8e0; }
    .ba-card__photo--after { background: #dff5e8; }
    .ba-card__photo-label {
      position: absolute; top: 8px; left: 8px;
      font-family: var(--font-head);
      font-size: 10px; font-weight: 700;
      padding: 4px 10px;
      border-radius: 12px;
      color: #fff;
    }
    .ba-card__photo--before .ba-card__photo-label { background: var(--red); }
    .ba-card__photo--after .ba-card__photo-label { background: var(--green); }
    .ba-card__photo-icon { font-size: 32px; opacity: .35; filter: grayscale(1); }
    .ba-card__photo-text { font-size: 10px; color: var(--mid-gray); text-align: center; }

    .ba-card__info { padding: 16px 20px; }
    .ba-card__name {
      font-family: var(--font-head);
      font-weight: 700; font-size: 14px;
      margin-bottom: 4px;
    }
    .ba-card__result {
      font-size: 14px; color: var(--red);
      font-weight: 600; margin-bottom: 8px;
    }
    .ba-card__quote {
      font-size: 13px; color: var(--mid-gray);
      font-style: italic;
    }

    /* Section 2.3: Your Case */
    .your-case { padding: 60px 0; text-align: center; }

    .your-case__frames {
      display: flex; gap: 0; align-items: stretch;
      justify-content: center;
      max-width: 700px; margin: 0 auto 32px;
    }
    .your-case__frame {
      flex: 1; aspect-ratio: 3/4;
      border: 3px dashed var(--red);
      border-radius: var(--radius-card);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      padding: 24px; min-height: 220px;
    }
    .your-case__frame-icon { font-size: 48px; opacity: .25; }
    .your-case__frame-text {
      font-family: var(--font-head);
      font-weight: 600; font-size: 14px;
      color: var(--mid-gray);
    }
    .your-case__divider {
      background: var(--red);
      color: #fff;
      font-family: var(--font-head);
      font-weight: 700; font-size: 14px;
      writing-mode: vertical-lr;
      text-orientation: mixed;
      display: flex; align-items: center; justify-content: center;
      padding: 16px 12px;
      border-radius: 8px;
      margin: 0 -2px;
      z-index: 1;
    }

    .your-case__success {
      background: var(--red);
      color: #fff;
      border-radius: var(--radius-card);
      padding: 32px 40px;
      max-width: 500px; margin: 0 auto 36px;
    }
    .your-case__success-title {
      font-family: var(--font-head);
      font-weight: 700; font-size: clamp(18px, 3vw, 24px);
    }

    .your-case__buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

    /* ── SCREEN 3: TARIFFS ── */
    .tariffs { padding: 60px 0 40px; }
    .tariffs__title {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: clamp(28px, 5vw, 44px);
      color: var(--red);
      text-align: center;
      margin-bottom: 40px;
    }

    .tariff-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 48px;
    }
    .tariff-card {
      background: var(--white);
      border: 2px solid var(--gray);
      border-radius: var(--radius-card);
      padding: 32px 24px;
      text-align: center;
      transition: all var(--transition);
      position: relative;
    }
    .tariff-card--popular {
      border-color: var(--orange);
      box-shadow: 0 8px 32px rgba(255,182,0,.25);
      transform: scale(1.04);
    }
    .tariff-card--popular::before {
      content: 'Популярный';
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      background: var(--orange); color: var(--dark);
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      padding: 4px 18px; border-radius: 20px;
    }
    .tariff-card__period {
      font-family: var(--font-head);
      font-weight: 700; font-size: 20px;
      color: var(--dark); margin-bottom: 8px;
    }
    .tariff-card__badge {
      display: inline-block;
      background: var(--green); color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 4px 14px; border-radius: 12px;
      margin-bottom: 20px;
    }
    .tariff-card__price {
      font-family: var(--font-head);
      font-weight: 900; font-size: 36px;
      color: var(--dark); margin-bottom: 4px;
    }
    .tariff-card__price span { font-size: 18px; font-weight: 500; }
    .tariff-card__surcharge {
      font-size: 14px; color: var(--mid-gray); margin-bottom: 8px;
    }
    .tariff-card__surcharge b { color: var(--dark); }
    .tariff-card__monthly {
      font-size: 15px; color: var(--green);
      font-weight: 700; margin-bottom: 20px;
    }
    .tariff-card__btn { width: 100%; }

    /* Promobox */
    .promobox {
      background: linear-gradient(135deg, #fff8eb, #fff);
      border: 3px solid var(--orange);
      border-radius: var(--radius-card);
      padding: 40px;
      text-align: center;
      max-width: 700px;
      margin: 0 auto 48px;
    }
    .promobox__title {
      font-family: var(--font-head);
      font-weight: 900; font-size: clamp(22px, 4vw, 32px);
      color: var(--dark); margin-bottom: 12px;
    }
    .promobox__desc {
      font-size: 16px; color: var(--dark); margin-bottom: 6px;
    }
    .promobox__note {
      font-size: 14px; color: var(--mid-gray); margin-bottom: 24px;
    }

    /* Tariffs CTA */
    .tariffs-cta {
      display: flex; gap: 16px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 48px;
    }

    /* Club Features */
    .club-features {
      background: var(--light);
      border-radius: var(--radius-card);
      padding: 40px;
      max-width: 800px;
      margin: 0 auto 40px;
    }
    .club-features__title {
      font-family: var(--font-head);
      font-weight: 700; font-size: 20px;
      text-align: center;
      margin-bottom: 24px;
    }
    .club-features__list {
      list-style: none;
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .club-features__item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 15px;
    }
    .club-features__check {
      width: 22px; height: 22px; flex-shrink: 0;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px;
      margin-top: 2px;
    }

    /* ── FOOTER ── */
    .footer {
      background: var(--dark);
      color: rgba(255,255,255,.6);
      text-align: center;
      padding: 32px 24px;
      font-size: 14px;
    }
    .footer a { color: var(--orange); text-decoration: none; }

    /* ── MODAL STUB ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay--active { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 40px;
      max-width: 440px; width: 90%;
      text-align: center;
    }
    .modal__icon { font-size: 48px; margin-bottom: 16px; }
    .modal__title {
      font-family: var(--font-head);
      font-weight: 700; font-size: 20px;
      margin-bottom: 12px;
    }
    .modal__text { font-size: 15px; color: var(--mid-gray); margin-bottom: 24px; }
    .modal__close { min-width: 160px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .cases-grid { grid-template-columns: repeat(2, 1fr); }
      .case-hero { grid-template-columns: 280px 1fr; gap: 32px; }
      .tariff-grid { gap: 16px; }
      .tariff-card--popular { transform: scale(1.02); }
      .club-features__list { grid-template-columns: 1fr; }
      .header__nav { display: none; }
    }

    @media (max-width: 768px) {
      .promo-bar { font-size: 12px; padding: 10px 16px; }
      .header { height: 64px; padding: 0 16px; }
      .header__logo svg { height: 30px; }
      .header__cta { font-size: 12px; padding: 10px 20px; }
      .header__nav { display: none; }
      .container { padding: 0 16px; }
      .hero { padding: 40px 0 10px; }
      .hero__sub { font-size: 15px; }
      .cases-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .case-card__label { font-size: 13px; }
      .case-card__btn { font-size: 12px; padding: 10px 12px; }

      .case-hero {
        grid-template-columns: 1fr;
        gap: 24px; padding: 30px 0;
      }
      .case-hero__photo { max-width: 300px; margin: 0 auto; }
      .tabs { overflow-x: auto; }
      .tab { font-size: 11px; padding: 10px 14px; white-space: nowrap; }
      .case-hero__buttons { flex-direction: column; }
      .case-hero__buttons .btn { width: 100%; }

      .ba-card { flex: 0 0 280px; }

      .your-case__frames { flex-direction: column; max-width: 300px; }
      .your-case__divider {
        writing-mode: horizontal-tb;
        padding: 8px 16px; margin: -2px 0;
      }

      .tariff-grid { grid-template-columns: 1fr; max-width: 380px; margin-left: auto; margin-right: auto; }
      .tariff-card--popular { transform: none; }
      .promobox { padding: 28px 20px; }
      .tariffs-cta { flex-direction: column; align-items: center; }
      .tariffs-cta .btn { width: 100%; max-width: 360px; }
      .your-case__buttons { flex-direction: column; align-items: center; }
      .your-case__buttons .btn { width: 100%; max-width: 320px; }
      .club-features { padding: 28px 20px; }
    }

    @media (max-width: 420px) {
      .cases-grid { grid-template-columns: 1fr; max-width: 320px; margin-left: auto; margin-right: auto; }
    }

    .fade-in { animation: fadeIn .4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<!-- Green promo bar — like walk-walk.ru -->
<div class="promo-bar">
  Успей вступить в клуб по специальным условиям
  <span class="promo-bar__badge">со скидкой 70%</span>
</div>

<!-- Header with real walk-walk.ru logo style -->

  <a href="#/cases" class="header__logo">

const CARDS_ORDER = ['20-30kg', '10-20kg', '7-10kg', 'tonus'];

function renderCasesPage() {
  const cards = CARDS_ORDER.map(slug => {
    const c = CASES[slug];
    return `
      <div class="case-card">
        <div class="case-card__photo">
          <div class="case-card__photo-circle">
            <div class="case-card__photo-icon">👤</div>
            <div class="case-card__photo-text">${c.photoDesc}</div>
          </div>
        </div>
        <div class="case-card__body">
          <div class="case-card__label">${c.title}</div>
          <a href="#/cases/${slug}" class="btn btn--orange case-card__btn">ЭТО МОЙ СЛУЧАЙ</a>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="container fade-in">
      <section class="hero">
        <h1 class="hero__title">ВЫБЕРИ СВОЙ КЕЙС</h1>
        <p class="hero__sub">Выбери, как ты выглядишь сейчас и получи рекомендацию для достижения лучшего результата</p>

      <div class="bottom-cta">
        <button class="btn btn--outline-red" onclick="openModal('question')">ЗАДАТЬ ВОПРОС</button>
      </div>
    </div>`;
}

function renderCasePage(slug) {
  const data = CASES[slug];
  if (!data) return renderCasesPage();

  const tabLabels = { week: 'ЗА НЕДЕЛЮ', months: '1-3 МЕСЯЦА', year: '6-12 МЕСЯЦЕВ' };

  const tabs = Object.keys(tabLabels).map((key, i) =>

  ).join('');

  const tabContents = Object.entries(data.timeline).map(([key, items], i) =>
    `<div class="tab-content${i === 0 ? ' tab-content--active' : ''}" data-panel="${key}">
      <ul class="tab-content__list">
        ${items.map(t => `<li class="tab-content__item"><span class="tab-content__check">✓</span><span>${t}</span></li>`).join('')}

    </div>`

        <div class="ba-card__result">${c.result}</div>

function route() {
  const hash = (window.location.hash || '#/cases').replace('#', '');
  const app = document.getElementById('app');

  if (hash === '/tariffs') {
    app.innerHTML = renderTariffsPage();
  } else if (hash.startsWith('/cases/')) {
    const slug = hash.replace('/cases/', '');
    app.innerHTML = renderCasePage(slug);
    initTabs();
  } else {
    app.innerHTML = renderCasesPage();
  }

  window.scrollTo({ top: 0, behavior: 'instant' });
}

function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab--active'));
      document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('tab-content--active'));
      tab.classList.add('tab--active');
      const panel = document.querySelector(`[data-panel="${tab.dataset.tab}"]`);
      if (panel) panel.classList.add('tab-content--active');
    });
  });
}

function openModal(type, detail) {
  const overlay = document.getElementById('modal');
  const title = document.getElementById('modalTitle');
  const text = document.getElementById('modalText');

  if (type === 'question') {
    title.textContent = 'Задать вопрос';
    text.textContent = 'Здесь будет подключён чат-бот или форма обратной связи.';
  } else if (type === 'tariff') {
    title.textContent = 'Оформление тарифа';
    text.textContent = 'Выбран тариф: ' + detail + '. Здесь будет подключён бот для оформления покупки.';
  } else if (type === 'promo') {
    title.textContent = 'Промобокс — 490 ₽';
    text.textContent = 'Здесь будет подключён бот для оформления покупки промобокса.';
  }

  overlay.classList.add('modal-overlay--active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('modal-overlay--active');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', () => {
  if (!window.location.hash) window.location.hash = '#/cases';
  route();
});
</script>
