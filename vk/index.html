  <script>
    // ─────────────────────────────────────────────────────────────
    // VK Mini App: дубль воронки (TG/MAX) под VK Bridge
    // ─────────────────────────────────────────────────────────────

    // Парсим launch params VK один раз
    var __vkParams = (function () {
      var p = new URLSearchParams(window.location.search);
      return {
        vk_app_id: p.get('vk_app_id') || '',
        vk_user_id: p.get('vk_user_id') || '',
        vk_ref: p.get('vk_ref') || '',          // источник запуска (menu/box/widget/community/...)
        vk_platform: p.get('vk_platform') || '', // mobile_web/mobile_iphone/mobile_android/desktop_web
        sign: p.get('sign') || '',
        isVK: !!p.get('vk_app_id')
      };
    })();

    // VK Bridge init (если SDK подгрузился)
    (function () {
      function init() {
        try {
          if (window.vkBridge && typeof window.vkBridge.send === 'function') {
            window.vkBridge.send('VKWebAppInit').catch(function(){});
          }
        } catch (e) {}
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();

    // Возврат пользователя, прошедшего квиз ранее: сразу на plan.html
    (function () {
      try {
        var incoming = new URLSearchParams(window.location.search);

        // Retake-триггер: ?retake=1 в URL
        if (incoming.get('retake') === '1') {
          try {
            localStorage.removeItem('shagay_quiz_v1');
            Object.keys(localStorage).forEach(function (k) {
              if (k.indexOf('shagay_quiz_v1_') === 0) localStorage.removeItem(k);
            });
          } catch (_) {}
          return;
        }

        var vkId = __vkParams.vk_user_id;
        var saved = null;
        if (vkId) {
          var a = localStorage.getItem('shagay_quiz_v1_' + vkId);
          if (a) saved = JSON.parse(a);
        }
        if (!saved) {
          var b = localStorage.getItem('shagay_quiz_v1');
          if (b) saved = JSON.parse(b);
        }
        if (!saved || saved.age == null) return;

        var params = new URLSearchParams();
        ['age','height','weight','goal','tries','lifestyle','readiness'].forEach(function (k) {
          if (saved[k] != null) params.set(k, saved[k]);
        });

        if (vkId) params.set('vk_id', vkId);
        if (!incoming.get('utm_source')) {
          params.set('utm_source', __vkParams.vk_ref || 'vk_quiz');
        }
        if (!incoming.get('utm_medium')) params.set('utm_medium', 'vk_miniapp');

        incoming.forEach(function (val, key) {
          if (!params.has(key)) params.set(key, val);
        });
        if (!params.has('sb_id')) params.set('sb_id', 'vk');
        params.set('returning', '1');
        params.set('platform', 'vk');

        try { if (typeof ym === 'function') ym(108598378, 'reachGoal', 'vk_returning_user'); } catch (e) {}

        window.location.replace('../plan.html?' + params.toString());
      } catch (e) {}
    })();

    // Прокидываем VK launch params в utm для метрики
    (function () {
      try {
        if (__vkParams.isVK) {
          var url = new URL(window.location.href);
          if (!url.searchParams.get('utm_source') && __vkParams.vk_ref) {
            url.searchParams.set('utm_source', __vkParams.vk_ref);
          }
          if (!url.searchParams.get('utm_medium')) {
            url.searchParams.set('utm_medium', 'vk_miniapp');
          }
          window.history.replaceState({}, '', url);

          if (typeof ym === 'function') {
            ym(108598378, 'params', {
              utm_source: __vkParams.vk_ref || 'direct',
              vk_miniapp: 1,
              vk_platform: __vkParams.vk_platform
            });
            ym(108598378, 'reachGoal', 'vk_app_open', {
              utm_source: __vkParams.vk_ref || 'direct',
              vk_platform: __vkParams.vk_platform
            });
          }
        } else {
          if (typeof ym === 'function') ym(108598378, 'reachGoal', 'vk_app_open');
        }
      } catch (e) {}
    })();

    // CTA → передача query в quiz
    (function () {
      var cta = document.getElementById('cta-quiz-start');
      if (!cta) return;
      function updateHref() {
        var qs = window.location.search || '';
        cta.href = './quiz.html' + qs;
      }
      updateHref();
      cta.addEventListener('click', function () {
        updateHref();
        try {
          if (typeof ym === 'function') ym(108598378, 'reachGoal', 'vk_cta_to_quiz');
        } catch (e) {}
      });
    })();
